global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ride-flow-ia'

rule_files: []

scrape_configs:
  - job_name: 'ride-flow-agents'
    static_configs:
      - targets: ['agents:8000']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
