services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: rideflow_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-rideflow}
      POSTGRES_USER:     ${POSTGRES_USER:-rideflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rideflow_secret}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    networks:
      - rideflow_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rideflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      com.rideflow.author: "LIORVYS GUARDIOLA"
      com.rideflow.code:   "7039"

  # ── FastAPI backend (Python) ────────────────────────────────────────────────
  fastapi:
    build:
      context: ./fastapi_backend
      dockerfile: Dockerfile
    container_name: rideflow_fastapi
    restart: unless-stopped
    environment:
      DATABASE_URL:       postgresql://${POSTGRES_USER:-rideflow}:${POSTGRES_PASSWORD:-rideflow_secret}@db:5432/${POSTGRES_DB:-rideflow}
      STRIPE_SECRET_KEY:  ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      NODE_ENV:           production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rideflow_net
    labels:
      com.rideflow.author: "LIORVYS GUARDIOLA"
      com.rideflow.code:   "7039"

  # ── Node.js backend (Express + WebSocket + AI Agents) ──────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rideflow_backend
    restart: unless-stopped
    environment:
      DATABASE_URL:      postgresql://${POSTGRES_USER:-rideflow}:${POSTGRES_PASSWORD:-rideflow_secret}@db:5432/${POSTGRES_DB:-rideflow}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      PORT:              3001
      NODE_ENV:          production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rideflow_net
    labels:
      com.rideflow.author: "LIORVYS GUARDIOLA"
      com.rideflow.code:   "7039"

  # ── React frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL:  /api
        REACT_APP_WS_URL:   wss://204.168.234.151/ws
    container_name: rideflow_frontend
    restart: unless-stopped
    networks:
      - rideflow_net
    labels:
      com.rideflow.author: "LIORVYS GUARDIOLA"
      com.rideflow.code:   "7039"

  # ── Nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: rideflow_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - fastapi
      - backend
      - frontend
    networks:
      - rideflow_net
    labels:
      com.rideflow.author: "LIORVYS GUARDIOLA"
      com.rideflow.code:   "7039"

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  db_data:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  rideflow_net:
    driver: bridge
